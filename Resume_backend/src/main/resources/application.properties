# Application configuration
server.port=${PORT:8080}
spring.application.name=resume-ai-backend
frontend.url=${FRONTEND_URL:http://localhost:5173}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/resume_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME:}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Gemini API configuration
# Optional: Debug logging for HTTP calls (WebClient)

groq.api.key=${GROQ_API_KEY:}
logging.level.org.springframework.web.reactive.function.client=DEBUG

feedback.recipient-email=${FEEDBACK_RECIPIENT_EMAIL:}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

serpapi.api-key=${SERPAPI_API_KEY:}
