services:
  - type: pserv
    name: resume-db
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./render/mysql/Dockerfile
    dockerContext: ./render/mysql
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: resume_app
      - key: MYSQL_USER
        value: resume_user
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false

  - type: web
    name: resume-backend
    runtime: docker
    plan: starter
    region: oregon
    rootDir: Resume_backend
    dockerfilePath: ./Resume_backend/Dockerfile
    dockerContext: ./Resume_backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: MYSQL_URL
        value: jdbc:mysql://resume-db:3306/resume_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - key: MYSQL_USERNAME
        fromService:
          type: pserv
          name: resume-db
          envVarKey: MYSQL_USER
      - key: MYSQL_PASSWORD
        fromService:
          type: pserv
          name: resume-db
          envVarKey: MYSQL_PASSWORD
      - key: GROQ_API_KEY
        sync: false
      - key: FEEDBACK_RECIPIENT_EMAIL
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SMTP_AUTH
        value: true
      - key: MAIL_SMTP_STARTTLS_ENABLE
        value: true
      - key: SERPAPI_API_KEY
        sync: false

  - type: web
    name: resume-frontend
    runtime: static
    plan: free
    rootDir: resume_frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./resume_frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
