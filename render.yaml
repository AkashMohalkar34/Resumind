databases:
  - name: resume-db
    plan: free
    region: oregon
    databaseName: resume_app
    user: resume_user
    ipAllowList: []

services:

  - type: web
    name: resume-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: Resume_backend
    dockerfilePath: ./Resume_backend/Dockerfile
    dockerContext: ./Resume_backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: resume-db
          property: connectionString
      - key: DATABASE_USER
        fromDatabase:
          name: resume-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: resume-db
          property: password
      - key: GROQ_API_KEY
        sync: false
      - key: FEEDBACK_RECIPIENT_EMAIL
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SMTP_AUTH
        value: true
      - key: MAIL_SMTP_STARTTLS_ENABLE
        value: true
      - key: SERPAPI_API_KEY
        sync: false

  - type: web
    name: resume-frontend
    runtime: static
    plan: free
    rootDir: resume_frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./resume_frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
